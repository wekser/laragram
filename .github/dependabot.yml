version: 2

updates:
  # Keep CI action versions current — this is the one place a library
  # genuinely benefits from Dependabot (Actions are pinned, unlike Composer
  # deps where the version constraint in composer.json already floats).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci

  # Composer dev dependencies. This is a library, so composer.lock is not
  # committed and the constraints in composer.json already permit patched
  # releases — Dependabot has nothing to bump and cannot open update PRs
  # without a lockfile. We keep the ecosystem registered only to surface
  # constraint-level issues, while silencing the noise from runtime/testing
  # frameworks whose advisories don't apply to this package (e.g. Laravel's
  # email-validation CVEs — Laragram is a Telegram bot package and sends no
  # mail; laravel/framework is require-dev only).
  - package-ecosystem: composer
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: deps
    ignore:
      - dependency-name: laravel/framework
      - dependency-name: orchestra/testbench
      - dependency-name: phpunit/phpunit
