name: tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

# A new push to the same ref makes in-flight runs obsolete — cancel them
# instead of paying for runners that test superseded commits.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4', '8.5']
        laravel: [11, 12, 13]
        # Test both ends of every dependency range: `lowest` proves the floor
        # we advertise (e.g. illuminate/support 11.0.0) actually works, not
        # only the latest patch; `highest` tracks current releases.
        dependencies: [lowest, highest]
        include:
          - laravel: 11
            testbench: '^9.0'
            phpunit: '^11.0'
          - laravel: 12
            testbench: '^10.0'
            phpunit: '^11.0'
          - laravel: 13
            testbench: '^11.0'
            phpunit: '^12.0'
        exclude:
          # Laravel 11 supports PHP 8.2 - 8.4 (the package floor is 8.3).
          - laravel: 11
            php: '8.5'

    name: PHP ${{ matrix.php }} · Laravel ${{ matrix.laravel }} · ${{ matrix.dependencies }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          # pdo_sqlite / sqlite3 back Testbench's in-memory test database.
          extensions: curl, mbstring, pdo_sqlite, sqlite3
          coverage: none

      - name: Constrain framework versions
        run: >
          composer require --no-update --dev
          "laravel/framework:^${{ matrix.laravel }}.0"
          "orchestra/testbench:${{ matrix.testbench }}"
          "phpunit/phpunit:${{ matrix.phpunit }}"

      - name: Install dependencies
        uses: ramsey/composer-install@v4
        with:
          dependency-versions: ${{ matrix.dependencies }}

      - name: Run tests
        run: vendor/bin/phpunit
